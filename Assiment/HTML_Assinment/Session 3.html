<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Assignment</title>
</head>

<body>

    <h1>Flipkart Product Review Form</h1>

    <form action="#" method="POST">

        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" required><br><br>

        <label for="rating">Rating:</label><br>
        <select id="rating" name="rating" required>
            <option value="" selected disabled>Select Rating</option>
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
        </select><br><br>

        <label for="review">Review Message:</label><br>
        <textarea id="review" name="review" rows="5" cols="40" minlength="20" required></textarea><br><br>

        <input type="submit" value="Submit Review">

    </form>

    <hr>

    <h1>Zomato Food Order Form</h1>

    <form action="#" method="POST">

        <!-- Disabled because the Order ID is generated by the system
            and should not be edited by the user. -->
        <label for="orderid">Order ID:</label><br>
        <input type="text" id="orderid" value="ORD12345" disabled><br><br>

        <label for="customer">User Name:</label><br>
        <input type="text" id="customer" name="customer" required><br><br>

        <label for="food">Food Item:</label><br>
        <select id="food" name="food" required>
            <option value="" selected disabled>Select Food</option>
            <option value="Masala Dosa">Masala Dosa</option>
            <option value="Paneer Butter Masala">Paneer Butter Masala</option>
            <option value="Veg Biryani">Veg Biryani</option>
        </select><br><br>

        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" min="1" required><br><br>

        <label for="instructions">Delivery Instructions:</label><br>
        <textarea id="instructions" name="instructions" rows="4" cols="40" required></textarea><br><br>

        <input type="submit" value="Place Order">

    </form>

</body>

</html>
