<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BookMyShow</title>

    <style>
        body {

            font-family: Arial;

            background: white;

            color: black;

            transition: 0.5s;

            padding: 20px;

        }

        .dark-mode {

            background: #121212;

            color: white;

        }

        button {

            padding: 10px 20px;

            font-size: 18px;

            cursor: pointer;

        }
    </style>

</head>

<body>

    <h1>Avengers: Endgame</h1>

    <p>
        Book your movie tickets now.
    </p>

    <button onclick="changeTheme()">
        Switch Theme
    </button>

    <script>

        function changeTheme() {

            document.body.classList.toggle("dark-mode");

        }

    </script>

</body>

</html>
