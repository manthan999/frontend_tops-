<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position & Display Assignment</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 30px;
        }

        h2 {
            margin: 25px 0 15px;
        }

        .spacing {
            margin: 20px 0;
            padding: 15px;
        }



        .restaurant-card {
            width: 320px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        .restaurant-card .section {
            border-bottom: 1px solid #ccc;
        }

        .restaurant-card .section:last-child {
            border-bottom: none;
        }

        .restaurant-name {
            font-size: 24px;
            font-weight: bold;
            color: #e23744;
        }

        .cuisine {
            color: #555;
        }

        .rating {
            font-weight: bold;
            color: green;
        }

        
        .product-tile {
            width: 220px;
            background: white;
            border: 1px solid #ccc;
            text-align: center;
            border-radius: 10px;
        }

        .product-tile img {
            width: 100%;
            display: block;
            border-radius: 10px 10px 0 0;
        }

        .product-name {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .price {
            display: inline-block;
            background: #2874f0;
            color: white;
            padding: 8px 15px;
            margin-top: 10px;
            border-radius: 5px;
        }

        .hide-price .price {
            display: none;
        }

        

        .whatsapp {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #25D366;
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        

        .movie-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .movie {
            position: relative;
            width: 180px;
        }

        .movie img {
            width: 100%;
            border-radius: 10px;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: red;
            color: white;
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>


    <h2>Zomato Restaurant Card</h2>

    <div class="restaurant-card spacing">

        <div class="section spacing">
            <div class="restaurant-name">Spice Villa</div>
        </div>

        <div class="section spacing">
            <div class="cuisine">North Indian , Chinese</div>
        </div>

        <div class="section spacing">
            <div class="rating">⭐ 4.5 / 5</div>
        </div>

    </div>


    

    <h2>Flipkart Product Tile</h2>

    

    <div class="product-tile spacing hide-price">

        <img src="images.jfif" alt="Product">

        <span class="product-name">
            Wireless Headphones
        </span>

        <span class="price">
            ₹1,999
        </span>

    </div>


    

    <h2>BookMyShow Movie Posters</h2>

    <div class="movie-grid">

        <div class="movie">
            <span class="badge">New</span>
            <img src="et00403805-cxrwswcesf-portrait.webp" alt="Movie 1">
        </div>

        <div class="movie">
            <img src="et00452553-ahtvqhdary-portrait.webp" alt="Movie 2">
        </div>

        <div class="movie">
            <img src="et00478890-gseacbrsej-portrait.webp" alt="Movie 3">
        </div>

    </div>


    
    <div class="whatsapp">
        💬 Chat
    </div>

</body>

</html>
